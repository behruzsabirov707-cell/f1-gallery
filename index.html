<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1 Gallery — The Art of Speed</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600&display=swap');

  :root {
    --red:    #e8002d;
    --orange: #ff7b00;
    --yellow: #ffd700;
    --teal:   #00d2be;
    --blue:   #1e41ff;
    --dark:   #0d0d0d;
    --card-bg: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f0f0f0;
    font-family: 'Inter', sans-serif;
    color: #111;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--dark);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 72px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--red);
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-size: 1.6rem;
    font-weight: 900;
    letter-spacing: 3px;
    background: linear-gradient(90deg, var(--red), var(--orange), var(--yellow));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo span { color: #fff; -webkit-text-fill-color: #fff; }

  nav { display: flex; gap: 6px; flex-wrap: wrap; }

  nav button {
    background: transparent;
    border: 2px solid #333;
    color: #aaa;
    border-radius: 999px;
    padding: 6px 16px;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  nav button:hover,
  nav button.active {
    border-color: var(--red);
    color: #fff;
    background: var(--red);
  }

  /* ── Hero ── */
  .hero {
    background: linear-gradient(135deg, #0d0d0d 0%, #1a0a00 50%, #200010 100%);
    text-align: center;
    padding: 70px 20px 60px;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.02) 40px, rgba(255,255,255,0.02) 41px),
      repeating-linear-gradient(0deg,  transparent, transparent 40px, rgba(255,255,255,0.02) 40px, rgba(255,255,255,0.02) 41px);
  }

  .hero h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2.2rem, 6vw, 4.5rem);
    font-weight: 900;
    color: #fff;
    letter-spacing: 4px;
    position: relative;
  }

  .hero h1 em {
    font-style: normal;
    background: linear-gradient(90deg, var(--red), var(--orange));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero p {
    color: #888;
    margin-top: 12px;
    font-size: 1.05rem;
    position: relative;
  }

  .stripe {
    display: flex;
    height: 6px;
    margin-top: 32px;
    position: relative;
  }
  .stripe div { flex: 1; }

  /* ── Filters ── */
  .filters {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 28px 20px 10px;
  }

  .filter-btn {
    border: none;
    border-radius: 999px;
    padding: 9px 22px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    opacity: 0.55;
  }

  .filter-btn.active, .filter-btn:hover { opacity: 1; transform: scale(1.05); }

  /* ── Gallery ── */
  .gallery {
    columns: 3 320px;
    gap: 16px;
    padding: 20px 32px 60px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .card {
    break-inside: avoid;
    margin-bottom: 16px;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    transition: transform 0.3s, box-shadow 0.3s;
    background: #fff;
  }

  .card:hover {
    transform: translateY(-6px) scale(1.01);
    box-shadow: 0 16px 40px rgba(0,0,0,0.2);
  }

  .card img {
    width: 100%;
    display: block;
    object-fit: cover;
    transition: filter 0.3s;
  }

  .card:hover img { filter: brightness(0.7); }

  .card-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 20px;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 55%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .card:hover .card-overlay { opacity: 1; }

  .card-team {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .card-title {
    color: #fff;
    font-weight: 700;
    font-size: 1.05rem;
  }

  .card-tag {
    display: inline-block;
    margin-top: 8px;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 0.7rem;
    font-weight: 600;
    color: #000;
    background: var(--yellow);
  }

  /* ── Lightbox ── */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.93);
    z-index: 999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    padding: 20px;
  }

  #lightbox.open { display: flex; }

  #lightbox img {
    max-width: 90vw;
    max-height: 75vh;
    border-radius: 12px;
    box-shadow: 0 0 60px rgba(232,0,45,0.3);
    object-fit: contain;
  }

  #lb-caption {
    color: #fff;
    font-size: 1.1rem;
    font-weight: 600;
    text-align: center;
  }

  #lb-sub {
    color: #888;
    font-size: 0.85rem;
    margin-top: 4px;
    text-align: center;
  }

  #lb-close {
    position: fixed;
    top: 20px;
    right: 28px;
    background: none;
    border: 2px solid #555;
    color: #fff;
    font-size: 1.5rem;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s;
  }
  #lb-close:hover { border-color: var(--red); color: var(--red); }

  #lb-prev, #lb-next {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.08);
    border: 2px solid #333;
    color: #fff;
    font-size: 1.5rem;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  #lb-prev { left: 16px; }
  #lb-next { right: 16px; }
  #lb-prev:hover, #lb-next:hover { border-color: var(--red); background: var(--red); }

  /* ── Footer ── */
  footer {
    background: var(--dark);
    color: #444;
    text-align: center;
    padding: 24px;
    font-size: 0.82rem;
    border-top: 2px solid #1a1a1a;
  }

  footer strong { color: var(--red); }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    header { flex-direction: column; height: auto; padding: 12px; gap: 8px; }
    .gallery { padding: 16px 12px 40px; }
  }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">F1<span> GALLERY</span></div>
  <nav>
    <button class="active" onclick="filterNav(this,'all')">All Teams</button>
    <button onclick="filterNav(this,'ferrari')">Ferrari</button>
    <button onclick="filterNav(this,'redbull')">Red Bull</button>
    <button onclick="filterNav(this,'mercedes')">Mercedes</button>
    <button onclick="filterNav(this,'mclaren')">McLaren</button>
    <button onclick="filterNav(this,'alpine')">Alpine</button>
  </nav>
</header>

<!-- Hero -->
<div class="hero">
  <h1>THE ART OF <em>SPEED</em></h1>
  <p>Explore the most iconic Formula 1 cars, circuits & moments</p>
  <div class="stripe">
    <div style="background:#e8002d"></div>
    <div style="background:#ff7b00"></div>
    <div style="background:#ffd700"></div>
    <div style="background:#00d2be"></div>
    <div style="background:#1e41ff"></div>
    <div style="background:#ff0090"></div>
  </div>
</div>

<!-- Category filters -->
<div class="filters" id="filterBar"></div>

<!-- Gallery -->
<div class="gallery" id="gallery"></div>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lb-close" onclick="closeLB()">✕</button>
  <button id="lb-prev" onclick="shiftLB(-1)">‹</button>
  <img id="lb-img" src="" alt="">
  <div>
    <div id="lb-caption"></div>
    <div id="lb-sub"></div>
  </div>
  <button id="lb-next" onclick="shiftLB(1)">›</button>
</div>

<!-- Footer -->
<footer>
  <strong>F1 GALLERY</strong> — celebrating the pinnacle of motorsport
</footer>

<script>
const TEAM_COLORS = {
  ferrari:  { bg: '#e8002d', label: '#fff' },
  redbull:  { bg: '#1e41ff', label: '#ffd700' },
  mercedes: { bg: '#00d2be', label: '#000' },
  mclaren:  { bg: '#ff7b00', label: '#000' },
  alpine:   { bg: '#0090ff', label: '#ff0090' },
  williams: { bg: '#00a3e0', label: '#fff' },
  haas:     { bg: '#b52f2f', label: '#fff' },
};

// Local images from Desktop
const photos = [
  { src:'images/images.jpeg',   title:'Race Day',           team:'ferrari',  tag:'Race',     year:2023 },
  { src:'images/images-1.jpeg', title:'Full Throttle',      team:'redbull',  tag:'Car',      year:2023 },
  { src:'images/images-2.jpeg', title:'Pit Lane Rush',      team:'mclaren',  tag:'Pit Stop', year:2023 },
  { src:'images/images-3.jpeg', title:'Monaco Hairpin',     team:'mercedes', tag:'Circuit',  year:2022 },
  { src:'images/images-4.jpeg', title:'Launch Control',     team:'ferrari',  tag:'Race',     year:2023 },
  { src:'images/images-5.jpeg', title:'Silver Arrow',       team:'mercedes', tag:'Car',      year:2022 },
  { src:'images/images-6.jpeg', title:'Apex Attack',        team:'redbull',  tag:'Circuit',  year:2022 },
  { src:'images/images-7.jpeg', title:'Papaya Blaze',       team:'mclaren',  tag:'Car',      year:2023 },
  { src:'images/images-8.jpeg', title:'Podium Moment',      team:'alpine',   tag:'Trophy',   year:2023 },
];

function imgUrl(photo) {
  return photo.src;
}

let currentFilter = 'all';
let filteredPhotos = [...photos];
let lbIndex = 0;

// Build category filter buttons
const categories = ['all','race','car','pit stop','circuit','trophy'];
const filterBar = document.getElementById('filterBar');
categories.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (cat === 'all' ? ' active' : '');
  btn.style.cssText = cat === 'all'
    ? 'background:#111;color:#fff;'
    : 'background:#fff;color:#111;border:2px solid #ddd;';
  btn.textContent = cat === 'all' ? 'All Photos' : cat.charAt(0).toUpperCase() + cat.slice(1);
  btn.onclick = () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGallery(cat === 'all' ? photos : photos.filter(p => p.tag.toLowerCase() === cat));
  };
  filterBar.appendChild(btn);
});

function renderGallery(list) {
  filteredPhotos = list;
  const gallery = document.getElementById('gallery');
  gallery.innerHTML = '';
  list.forEach((photo, i) => {
    const tc = TEAM_COLORS[photo.team] || { bg:'#333', label:'#fff' };
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.team = photo.team;
    card.innerHTML = `
      <img src="${imgUrl(photo)}" alt="${photo.title}">
      <div class="card-overlay">
        <div class="card-team" style="color:${tc.bg}">${photo.team.toUpperCase()} · ${photo.year}</div>
        <div class="card-title">${photo.title}</div>
        <span class="card-tag" style="background:${tc.bg};color:${tc.label}">${photo.tag}</span>
      </div>
    `;
    card.onclick = () => openLB(i);
    gallery.appendChild(card);
  });
}

function filterNav(btn, team) {
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const list = team === 'all' ? photos : photos.filter(p => p.team === team);
  renderGallery(list);
}

// Lightbox
function openLB(i) {
  lbIndex = i;
  showLB();
  document.getElementById('lightbox').classList.add('open');
}

function closeLB() {
  document.getElementById('lightbox').classList.remove('open');
}

function shiftLB(dir) {
  lbIndex = (lbIndex + dir + filteredPhotos.length) % filteredPhotos.length;
  showLB();
}

function showLB() {
  const p = filteredPhotos[lbIndex];
  document.getElementById('lb-img').src = imgUrl(p);
  document.getElementById('lb-caption').textContent = p.title;
  document.getElementById('lb-sub').textContent = `${p.team.charAt(0).toUpperCase()+p.team.slice(1)} · ${p.year} · ${p.tag}`;
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape')     closeLB();
  if (e.key === 'ArrowRight') shiftLB(1);
  if (e.key === 'ArrowLeft')  shiftLB(-1);
});

document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) closeLB();
});

renderGallery(photos);
</script>
</body>
</html>
